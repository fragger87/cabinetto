<fieldset>
  <legend>{{ 'report.cabinets' | tr }}</legend>

  @for (cab of cabinets; track $index; let i = $index) {
    <div class="cabinet-row">
      <div class="cabinet-row-content">
        <div class="cabinet-inputs">
          <div class="cabinet-fields">
            <label>
              {{ 'cabinet.name' | tr }} <app-info-button helpKey="cabinetName" />
              <input type="text" [(ngModel)]="cab.name" (ngModelChange)="emit()" />
            </label>
            <label>
              {{ 'cabinet.width' | tr }} <app-info-button helpKey="cabinetWidth" />
              <input type="number" [(ngModel)]="cab.width" (ngModelChange)="emit()" min="200" />
            </label>
            <label>
              {{ 'cabinet.quantity' | tr }} <app-info-button helpKey="cabinetQuantity" />
              <input type="number" [(ngModel)]="cab.quantity" (ngModelChange)="emit()" min="1" />
            </label>
            <label>
              {{ 'cabinet.heightOverride' | tr }}
              <app-info-button helpKey="cabinetHeightOverride" />
              <input
                type="number"
                [ngModel]="cab.totalHeight ?? null"
                (ngModelChange)="cab.totalHeight = $event || undefined; emit()"
                [placeholder]="'cabinet.heightPlaceholder' | tr"
              />
            </label>
            <button type="button" (click)="removeCabinet(i)">{{ 'cabinet.remove' | tr }}</button>
          </div>

          <app-drawer-config [config]="cab.drawers" (configChange)="onDrawerChange(i, $event)" />
        </div>

        <!-- Inline mini preview -->
        <app-svg-cabinet-mini
          [width]="cab.width"
          [drawerCount]="cab.drawers?.count ?? 0"
          [drawerLines]="drawerLinePositions(cab)"
        />
      </div>
    </div>
  }

  @if (cabinets.length === 0) {
    <p>{{ 'app.noCabinetsHint' | tr }}</p>
  }

  <button type="button" (click)="addCabinet()">{{ 'app.addCabinet' | tr }}</button>
</fieldset>
