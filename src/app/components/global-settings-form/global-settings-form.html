<div class="form-diagram-layout">
  <div class="form-fields">
    <fieldset [formGroup]="form">
      <legend>{{ 'settings.title' | tr }}</legend>

      <div class="form-row">
        <label for="cabinetType">{{ 'settings.cabinetType' | tr }}</label>
        <app-info-button helpKey="cabinetType" />
        <select id="cabinetType" formControlName="cabinetType">
          @for (type of cabinetTypes; track type) {
            <option [value]="type">{{ 'settings.cabinetType.' + type | tr }}</option>
          }
        </select>
      </div>

      <div class="form-row">
        <label for="totalHeight">{{ 'settings.totalHeight' | tr }}</label>
        <app-info-button helpKey="totalHeight" />
        <input id="totalHeight" type="number" formControlName="totalHeight" />
      </div>

      <div class="form-row">
        <label for="railWidth">{{ 'settings.railWidth' | tr }}</label>
        <app-info-button helpKey="railWidth" />
        <input id="railWidth" type="number" formControlName="railWidth" />
      </div>

      <div class="form-row">
        <label for="backPanelMount">{{ 'settings.backPanelMount' | tr }}</label>
        <app-info-button helpKey="backPanelMount" />
        <select id="backPanelMount" formControlName="backPanelMount">
          <option value="nailed">{{ 'settings.backPanelMount.nailed' | tr }}</option>
          <option value="grooved">{{ 'settings.backPanelMount.grooved' | tr }}</option>
        </select>
      </div>

      @if (form.get('backPanelMount')?.value === 'grooved') {
        <div class="form-row">
          <label for="backPanelOverlap">{{ 'settings.backPanelOverlap' | tr }}</label>
          <input id="backPanelOverlap" type="number" formControlName="backPanelOverlap" />
        </div>
      }

      <div class="form-row">
        <label for="drawerBottomMount">{{ 'settings.drawerBottomMount' | tr }}</label>
        <app-info-button helpKey="drawerBottomMount" />
        <select id="drawerBottomMount" formControlName="drawerBottomMount">
          <option value="nailed">{{ 'settings.drawerBottomMount.nailed' | tr }}</option>
          <option value="grooved">{{ 'settings.drawerBottomMount.grooved' | tr }}</option>
        </select>
      </div>

      @if (form.get('drawerBottomMount')?.value === 'grooved') {
        <div class="form-row">
          <label for="drawerBottomOverlap">{{ 'settings.drawerBottomOverlap' | tr }}</label>
          <input id="drawerBottomOverlap" type="number" formControlName="drawerBottomOverlap" />
        </div>
      }
    </fieldset>

    @if (isBase) {
      <app-polymorphic-field
        [label]="'settings.legHeight' | tr"
        helpKey="legs"
        [value]="legs"
        (valueChange)="onLegsChange($event)"
      />
    }

    <app-polymorphic-field
      [label]="'settings.depth' | tr"
      helpKey="depth"
      [value]="depth"
      (valueChange)="onDepthChange($event)"
    />
  </div>

  <app-svg-cabinet-profile [totalHeight]="form.get('totalHeight')?.value" [isBase]="isBase" />
</div>
