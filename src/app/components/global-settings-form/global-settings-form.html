<div class="form-diagram-layout">
  <div class="form-fields">
    <fieldset [formGroup]="form">
      <legend>Project Settings</legend>

      <div class="form-row">
        <label for="cabinetType">Cabinet type</label>
        <select id="cabinetType" formControlName="cabinetType">
          @for (type of cabinetTypes; track type) {
            <option [value]="type">{{ type }}</option>
          }
        </select>
      </div>

      <div class="form-row">
        <label for="totalHeight">Default total height (mm)</label>
        <input id="totalHeight" type="number" formControlName="totalHeight" />
      </div>

      <div class="form-row">
        <label for="bottomMode">Bottom mode</label>
        <select id="bottomMode" formControlName="bottomMode">
          <option value="full">Full depth</option>
          <option value="recessed">Recessed</option>
        </select>
      </div>

      <div class="form-row">
        <label for="railWidth">Top rail width (mm)</label>
        <input id="railWidth" type="number" formControlName="railWidth" />
      </div>

      <div class="form-row">
        <label for="drawerBottomMount">Drawer bottom mount</label>
        <select id="drawerBottomMount" formControlName="drawerBottomMount">
          <option value="under">Under (bottom mount)</option>
          <option value="grooved">Grooved (inside mount)</option>
        </select>
      </div>

      @if (form.get('drawerBottomMount')?.value === 'grooved') {
        <div class="form-row">
          <label for="drawerBottomOverlap">Groove depth / overlap (mm)</label>
          <input id="drawerBottomOverlap" type="number" formControlName="drawerBottomOverlap" />
        </div>
      }
    </fieldset>

    @if (isBase) {
      <app-polymorphic-field
        label="Leg height"
        [value]="legs"
        (valueChange)="onLegsChange($event)"
      />
    }

    <app-polymorphic-field label="Depth" [value]="depth" (valueChange)="onDepthChange($event)" />
  </div>

  <!-- Explanatory cabinet side-profile diagram -->
  <svg class="explain-svg" width="180" height="220" viewBox="0 0 180 220">
    <!-- Cabinet body -->
    <rect
      x="40"
      y="20"
      width="60"
      height="140"
      fill="#f5ead0"
      stroke="#8B4513"
      stroke-width="1.5"
    />

    <!-- Top rail -->
    <rect
      x="40"
      y="20"
      width="60"
      height="10"
      fill="rgba(70,130,180,0.5)"
      stroke="#4169E1"
      stroke-width="0.5"
    />
    <text x="130" y="28" font-size="7" fill="#4169E1">rail</text>

    <!-- Bottom panel -->
    <rect
      x="40"
      y="150"
      width="60"
      height="5"
      fill="rgba(34,139,34,0.5)"
      stroke="#228B22"
      stroke-width="0.5"
    />

    <!-- Legs (dashed) -->
    @if (isBase) {
      <rect
        x="45"
        y="160"
        width="10"
        height="30"
        fill="none"
        stroke="#666"
        stroke-width="1"
        stroke-dasharray="3,2"
      />
      <rect
        x="85"
        y="160"
        width="10"
        height="30"
        fill="none"
        stroke="#666"
        stroke-width="1"
        stroke-dasharray="3,2"
      />
    }

    <!-- Total height dimension (left) -->
    <line x1="28" y1="20" x2="28" [attr.y2]="isBase ? 190 : 160" stroke="#555" stroke-width="0.8" />
    <line x1="24" y1="20" x2="32" y2="20" stroke="#555" stroke-width="0.8" />
    <line
      x1="24"
      [attr.y1]="isBase ? 190 : 160"
      x2="32"
      [attr.y2]="isBase ? 190 : 160"
      stroke="#555"
      stroke-width="0.8"
    />
    <text
      x="12"
      y="100"
      text-anchor="middle"
      font-size="8"
      fill="#333"
      transform="rotate(-90,12,100)"
    >
      total {{ form.get('totalHeight')?.value }}
    </text>

    <!-- Body height (right) -->
    <line x1="112" y1="20" x2="112" y2="160" stroke="#8B4513" stroke-width="0.6" />
    <text x="120" y="95" font-size="7" fill="#8B4513" transform="rotate(90,120,95)">body</text>

    <!-- Leg height label -->
    @if (isBase) {
      <text x="70" y="180" text-anchor="middle" font-size="8" fill="#666">legs</text>
    }

    <!-- Depth arrow (bottom) -->
    <line x1="40" y1="202" x2="100" y2="202" stroke="#555" stroke-width="0.8" />
    <line x1="40" y1="198" x2="40" y2="206" stroke="#555" stroke-width="0.8" />
    <line x1="100" y1="198" x2="100" y2="206" stroke="#555" stroke-width="0.8" />
    <text x="70" y="215" text-anchor="middle" font-size="8" fill="#333">depth</text>
  </svg>
</div>
