<fieldset [formGroup]="form" class="form-with-diagram">
  <legend>Carcass Board (18 mm)</legend>
  <div class="form-diagram-layout">
    <div class="form-fields">
      <div class="form-row">
        <label for="boardWidth">Width (mm)</label>
        <input id="boardWidth" type="number" formControlName="width" />
      </div>
      <div class="form-row">
        <label for="boardHeight">Height (mm)</label>
        <input id="boardHeight" type="number" formControlName="height" />
      </div>
      <div class="form-row">
        <label for="thickness">Thickness (mm)</label>
        <input id="thickness" type="number" formControlName="thickness" />
      </div>
      <div class="form-row">
        <label for="kerf">Saw kerf (mm)</label>
        <input id="kerf" type="number" formControlName="kerf" />
      </div>
    </div>
    <svg class="explain-svg" width="180" height="140" viewBox="0 0 180 140">
      <rect
        x="25"
        y="15"
        width="130"
        height="90"
        fill="#f5ead0"
        stroke="#8B4513"
        stroke-width="1.5"
        rx="2"
      />
      <line x1="25" y1="8" x2="155" y2="8" stroke="#555" stroke-width="0.8" />
      <text x="90" y="6" text-anchor="middle" font-size="9" fill="#333">
        {{ form.get('width')?.value }}
      </text>
      <line x1="163" y1="15" x2="163" y2="105" stroke="#555" stroke-width="0.8" />
      <text
        x="173"
        y="64"
        text-anchor="middle"
        font-size="9"
        fill="#333"
        transform="rotate(90,173,64)"
      >
        {{ form.get('height')?.value }}
      </text>
      <rect
        x="25"
        y="105"
        width="25"
        height="6"
        fill="#d4a843"
        stroke="#8B4513"
        stroke-width="0.5"
      />
      <text x="54" y="114" font-size="7" fill="#888">t={{ form.get('thickness')?.value }}</text>
      <line
        x1="75"
        y1="15"
        x2="75"
        y2="105"
        stroke="#c0392b"
        stroke-width="1.5"
        stroke-dasharray="4,3"
      />
      <text x="79" y="124" font-size="7" fill="#c0392b">kerf={{ form.get('kerf')?.value }}</text>
    </svg>
  </div>
</fieldset>
