<div class="drawer-config">
  <label class="toggle">
    <input type="checkbox" [checked]="enabled" (change)="toggleEnabled()" />
    {{ 'drawer.hasDrawers' | tr }}
  </label>

  @if (enabled) {
    <div class="drawer-fields">
      <div class="form-row">
        <label for="drawerCount">{{ 'drawer.count' | tr }}</label>
        <app-info-button helpKey="drawerCount" />
        <input
          id="drawerCount"
          type="number"
          [(ngModel)]="count"
          (ngModelChange)="onCountChange()"
          min="1"
          max="10"
        />
      </div>

      <div class="form-row">
        <label for="drawerLayout">{{ 'drawer.layout' | tr }}</label>
        <app-info-button helpKey="drawerLayout" />
        <select id="drawerLayout" [(ngModel)]="layout" (ngModelChange)="onLayoutChange()">
          @for (l of layouts; track l) {
            <option [value]="l">{{ l }}</option>
          }
        </select>
      </div>

      @if (layout === 'custom') {
        <div class="custom-heights">
          @for (h of customHeights; track $index; let i = $index) {
            <div class="form-row">
              <label [for]="'drawerHeight' + i">Drawer {{ i + 1 }} height (mm)</label>
              <input
                [id]="'drawerHeight' + i"
                type="number"
                [ngModel]="customHeights[i]"
                (ngModelChange)="customHeights[i] = $event; emit()"
                min="60"
              />
            </div>
          }
        </div>
      }

      <details>
        <summary>{{ 'drawer.advancedSettings' | tr }}</summary>
        <div class="form-row">
          <label for="slideClearance">{{ 'drawer.slideClearance' | tr }}</label>
          <app-info-button helpKey="slideClearance" />
          <input
            id="slideClearance"
            type="number"
            [(ngModel)]="slideClearance"
            (ngModelChange)="emit()"
            min="0"
          />
        </div>
        <div class="form-row">
          <label for="frontGap">{{ 'drawer.frontGap' | tr }}</label>
          <app-info-button helpKey="frontGap" />
          <input
            id="frontGap"
            type="number"
            [(ngModel)]="frontGap"
            (ngModelChange)="emit()"
            min="0"
          />
        </div>
        <div class="form-row">
          <label for="drawerGap">{{ 'drawer.drawerGap' | tr }}</label>
          <app-info-button helpKey="drawerGap" />
          <input
            id="drawerGap"
            type="number"
            [(ngModel)]="drawerGap"
            (ngModelChange)="emit()"
            min="0"
          />
        </div>
        <!-- Drawer material thickness derived from board selection -->
      </details>
    </div>
  }
</div>
