<div class="project-toolbar">
  <button type="button" (click)="save()">{{ 'toolbar.save' | tr }}</button>
  <button type="button" (click)="load()">{{ 'toolbar.load' | tr }}</button>
  <button type="button" (click)="exportJson()">{{ 'toolbar.export' | tr }}</button>
  <button type="button" (click)="triggerImport()">{{ 'toolbar.import' | tr }}</button>

  <input #fileInput type="file" accept=".json" (change)="onFileSelected($event)" hidden />

  @if (error()) {
    <span class="toolbar-error">{{ error() }}</span>
  }
  @if (success()) {
    <span class="toolbar-success">{{ success() }}</span>
  }
</div>
