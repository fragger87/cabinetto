<header>
  <h1>{{ 'app.title' | tr }}</h1>
  <app-project-toolbar />
  <app-language-selector />
</header>

<main>
  <section class="input-panel">
    <app-material-library />
    <app-material-assignment />
    <app-global-settings-form />
    <app-cabinet-list />

    <div class="actions">
      <button type="button" class="calculate-btn" (click)="calculate()">
        {{ 'app.calculate' | tr }}
      </button>
      @if (error()) {
        <span class="error">{{ error() }}</span>
      }
    </div>
  </section>

  @if (result() && bom() && lastConfig()) {
    <app-report-page [result]="result()!" [bom]="bom()!" [config]="lastConfig()!" />
  }
</main>
